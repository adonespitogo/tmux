# Set the control character to Ctrl+Spacebar (instead of Ctrl+B)
set -g prefix C-space;
unbind-key C-b
bind-key C-space send-prefix

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Move windows left/right with ctrl+shift+left or ctrl+shift+right
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1


# Switch between windows
unbind-key C-h
unbind-key C-l
bind-key -n C-h select-window -p
bind-key -n C-l select-window -n

# Active window title color
setw -g window-status-current-style fg=black,bg=white

# Set vi mode in copy mode
set-window-option -g mode-keys vi

# Use 'v' and 'y' to copy like in vim
# bind-key -T copy-mode-vi 'v' send -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# With tmux 2.3+, the b: format modifier shows the "basename" (or "tail") of a path.
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# For this to work, install:
# https://github.com/thewtex/tmux-mem-cpu-load
set -g status-right "#[fg=black,bg=green]#(tmux-mem-cpu-load --colors --interval 2 -a 0)#[default]"
set -g status-right-length 60
