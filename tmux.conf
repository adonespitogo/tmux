# Set the control character to Ctrl+Spacebar (instead of Ctrl+B)
set -g prefix C-space;
unbind-key C-b
bind-key C-space send-prefix

# Set vi mode in copy mode
set-window-option -g mode-keys vi
# Use 'v' and 'y' to copy like in vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Switch between windows
bind-key h select-window -p
bind-key l select-window -n

# Swap windows
bind-key H swap-window -t -1\; select-window -t -1
bind-key L swap-window -t +1\; select-window -t +1

# Enable mouse scrolling
set -g mouse on

# Status line on top
# set-option -g status-position top

# Active window title color
# setw -g window-status-current-style fg=black,bg=white

# With tmux 2.3+, the b: format modifier shows the "basename" (or "tail") of a path.
# set-option -g status-interval 1
# set-option -g automatic-rename on
# set-option -g automatic-rename-format '#{b:pane_current_path}'

# Show memory/cpu load in right side of status line
# set -g status-right "#[fg=black,bg=green]#(~/.tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load --colors --interval 2 -a 0)#[default]"
# set -g status-right-length 60

# Theme configuration
set -g @nova-rows 0
set -g @nova-nerdfonts false
set -g @nova-segment-mode "#{?client_prefix,Ω,\uf179}"
set -g @nova-segment-mode-colors "#78a2c1 #2e3440"

set -g @nova-pane "#I: #W"

set -g @nova-segment-whoami "#(~/.tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load --colors --interval 2 -a 0)"
set -g @nova-segment-whoami-colors "#78a2c1 #2e3440"

set -g "@nova-pane-active-border-style" "#44475a"
set -g "@nova-pane-border-style" "#282a36"
set -g "@nova-status-style-bg" "#4c566a"
set -g "@nova-status-style-fg" "#d8dee9"
set -g "@nova-status-style-active-bg" "#89c0d0"
set -g "@nova-status-style-active-fg" "#2e3540"
set -g "@nova-status-style-double-bg" "#2d3540"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'o0th/tmux-nova'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
